<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirpa Enterprises</title>
    
    <style>
        #vercel-web-analytics, 
        .vercel-toolbar, 
        [data-v0-badge], 
        .v0-badge, 
        #v0-badge,
        vercel-vercel-toolbar,
        iframe[src*="vercel"],
        [class*="v0-badge"],
        div[class*="v0-badge"],
        .vercel-toolbar-container { 
            display: none !important; 
            visibility: hidden !important; 
            opacity: 0 !important;
            pointer-events: none !important; 
            width: 0 !important;
            height: 0 !important;
            position: absolute !important;
            left: -9999px !important;
        }

        :root {
            --primary: #0070f3;
            --dark: #0f172a;
            --light: #f8fafc;
            --gray: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--dark) !important;
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(30, 41, 59, 0.7);
            padding: 3rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; }
        p { color: var(--gray); font-size: 1.2rem; margin-bottom: 2rem; }
        .badge-status {
            display: inline-block;
            background: rgba(0, 112, 243, 0.2);
            color: var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 600;
        }
    </style>

    <script>
        (function() {
            const targets = [
                '#vercel-web-analytics', '.vercel-toolbar', '[data-v0-badge]', 
                '.v0-badge', '#v0-badge', 'vercel-vercel-toolbar', '.vercel-toolbar-container'
            ];
            
            function obliterate() {
                targets.forEach(s => document.querySelectorAll(s).forEach(e => e.remove()));
                document.querySelectorAll('div').forEach(d => {
                    if (d.className && typeof d.className === 'string' && d.className.includes('v0-badge')) {
                        d.remove();
                    }
                });
            }

            // Guard the website live as it loads
            const observer = new MutationObserver((mutations) => {
                obliterate();
            });

            observer.observe(document.documentElement, {
                childList: true,
                subtree: true
            });

            // Fallback backups
            obliterate();
            window.addEventListener('DOMContentLoaded', obliterate);
            window.addEventListener('load', obliterate);
            setInterval(obliterate, 50);
        })();
    </script>
</head>
<body>
    <div class="container">
        <h1>Mirpa Enterprises Private Limited</h1>
        <p>Circular Infrastructure Hub & Sustainable Asset Management</p>
        <span class="badge-status">System Live & Fully Secured</span>
    </div>
</body>
</html>
