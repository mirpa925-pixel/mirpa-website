<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirpa Enterprises</title>
    <style>
        /* =========================================================
           SAFETY SWITCH: THIS PERMANENTLY BLOCKS THE V0 BADGE
           ========================================================= */
        #vercel-web-analytics, 
        .vercel-toolbar, 
        [data-v0-badge], 
        .v0-badge, 
        #v0-badge,
        vercel-vercel-toolbar,
        div[class*="v0-badge"],
        [class*="v0-badge"] { 
            display: none !important; 
            visibility: hidden !important; 
            opacity: 0 !important;
            pointer-events: none !important; 
        }

        /* =========================================================
           PREMIUM CORPORATE DARK SYSTEM THEME
           ========================================================= */
        :root {
            --primary: #0070f3; /* Premium Tech Blue */
            --dark: #0f172a;    /* Clean Dark Slate */
            --light: #f8fafc;   /* Soft Ice White */
            --gray: #64748b;    /* Pro Subtext Gray */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark);
            color: var(--light);
            line-height: 1.6;
            padding: 2rem;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: rgba(30, 41, 59, 0.7);
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--light);
            margin-bottom: 1rem;
            font-weight: 700;
            letter-spacing: -0.05em;
        }

        p {
            color: var(--gray);
            font-size: 1.2rem;
            margin-bottom: 2rem;
        }

        .badge-status {
            display: inline-block;
            background: rgba(0, 112, 243, 0.2);
            color: var(--primary);
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.9rem;
            border: 1px solid var(--primary);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Mirpa Enterprises Private Limited</h1>
        <p>Circular Infrastructure Hub & Sustainable Asset Management</p>
        <span class="badge-status">System Live & Fully Secured</span>
    </div>
</body>
</html>
