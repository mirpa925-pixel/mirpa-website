<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mirpa Enterprises – High-Altitude IT Infrastructure & Circular Solutions</title>
  <meta name="description" content="DPIIT-recognised startup. Multi-OEM procurement, e-waste circularity, and high-altitude diagnostics. Based in Ladakh. GeM-registered, MSE-certified.">
  <meta name="keywords" content="Mirpa Enterprises, Ladakh IT infrastructure, multi-OEM procurement, e-waste circularity, GeM registered, DPIIT startup, MSE certified, high altitude IT">
  <meta property="og:title" content="Mirpa Enterprises – High-Altitude IT Infrastructure & Circular Solutions">
  <meta property="og:description" content="DPIIT-recognised startup based in Ladakh. Multi-OEM procurement, e-waste circularity, and high-altitude diagnostics.">
  <meta property="og:url" content="https://mirpa.in">
  <link rel="canonical" href="https://mirpa.in">

  <style>
    /* ═══════════════════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════════════════ */
    :root {
      --ink:       #09131F;   /* near-black base */
      --deep:      #0D1C2E;   /* section bg */
      --card:      #111F30;   /* card surface */
      --raised:    #172640;   /* elevated card */
      --rim:       #1F3550;   /* borders */
      --sky:       #4A90E2;   /* primary accent */
      --sky-hi:    #6AAEF5;   /* hover sky */
      --ice:       #A8CCEE;   /* muted sky */
      --sand:      #C9A96E;   /* warm accent */
      --terra:     #B8603C;   /* depth accent */
      --white:     #EEF3F9;   /* body text */
      --muted:     #7B99B8;   /* secondary text */
      --dim:       #3A5570;   /* disabled/footnote */
      --glow:      rgba(74, 144, 226, 0.18);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      scroll-behavior: smooth;
      font-size: 16px;
    }

    body {
      background: var(--ink);
      color: var(--white);
      font-family: system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif;
      line-height: 1.65;
      overflow-x: hidden;
    }

    /* ═══════════════════════════════════════════
       UTILITY
    ═══════════════════════════════════════════ */
    .container {
      max-width: 1120px;
      margin-inline: auto;
      padding-inline: 2rem;
    }

    .eyebrow {
      display: inline-block;
      font-size: 0.68rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--sky);
      margin-bottom: 0.9rem;
    }

    .section-title {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(1.9rem, 3.8vw, 3rem);
      font-weight: 700;
      line-height: 1.15;
      color: var(--white);
    }

    .section-lead {
      font-size: 1.05rem;
      color: var(--muted);
      line-height: 1.8;
      max-width: 680px;
      margin-top: 1rem;
    }

    /* ═══════════════════════════════════════════
       NAV
    ═══════════════════════════════════════════ */
    #nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      background: rgba(9, 19, 31, 0.88);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(74, 144, 226, 0.1);
    }

    .nav-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    /* Logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      text-decoration: none;
    }

    /* CSS geometric mark — a stylised angular M formed by a rhombus */
    .logo-mark {
      position: relative;
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }
    .logo-mark::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--sky);
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      opacity: 0.9;
    }
    .logo-mark::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 10px; height: 10px;
      background: var(--ink);
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    }

    .logo-text {
      font-family: Georgia, serif;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      color: var(--white);
    }

    /* Nav links */
    .nav-links {
      display: flex;
      list-style: none;
      gap: 0.2rem;
    }
    .nav-links a {
      display: block;
      padding: 0.4rem 0.85rem;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.83rem;
      letter-spacing: 0.06em;
      border-radius: 3px;
      transition: color 0.2s, background 0.2s;
    }
    .nav-links a:hover,
    .nav-links a:focus-visible {
      color: var(--sky);
      background: rgba(74,144,226,0.08);
      outline: none;
    }

    /* Mobile hamburger (pure CSS checkbox trick) */
    .nav-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
      background: none;
      border: none;
    }
    .nav-toggle span {
      display: block;
      width: 22px; height: 2px;
      background: var(--muted);
      border-radius: 2px;
      transition: transform 0.25s, opacity 0.25s;
    }

    @media (max-width: 720px) {
      .nav-links {
        display: none;
        position: fixed;
        top: 64px; left: 0; right: 0;
        background: var(--deep);
        border-bottom: 1px solid var(--rim);
        flex-direction: column;
        padding: 1rem 0;
        gap: 0;
      }
      .nav-links.open { display: flex; }
      .nav-links a { padding: 0.75rem 2rem; font-size: 0.9rem; }
      .nav-toggle { display: flex; }
    }

    /* ═══════════════════════════════════════════
       HERO
    ═══════════════════════════════════════════ */
    #hero {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      padding-top: 64px;
    }

    /* ─── Sky gradient ─── */
    .hero-sky {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        170deg,
        #06101C 0%,
        #0B1E35 38%,
        #0F2845 65%,
        #0D1C2E 100%
      );
    }

    /* ─── Stars ─── */
    .stars {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .s {
      position: absolute;
      border-radius: 50%;
      background: #fff;
      opacity: 0;
      animation: blink var(--d, 4s) var(--dl, 0s) ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 0; }
      50%       { opacity: var(--op, 0.6); }
    }

    /* ─── Mountain layers (pure CSS polygons) ─── */
    .mtn-wrap {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 65%;
      pointer-events: none;
    }

    .mtn {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 100%;
    }

    /* Layer 1 – farthest, palest */
    .mtn-1 {
      clip-path: polygon(
        0 100%, 0 80%, 3% 65%, 7% 70%, 11% 58%,
        15% 48%, 19% 60%, 23% 50%, 27% 38%,
        31% 28%, 36% 40%, 40% 30%, 44% 20%,
        48% 30%, 52% 18%, 57% 12%, 61% 22%,
        65% 14%, 69% 8%, 73% 18%, 77% 10%,
        81% 20%, 85% 14%, 89% 26%, 92% 18%,
        95% 28%, 98% 22%, 100% 30%, 100% 100%
      );
      background: linear-gradient(180deg, #18365A 0%, #0E2040 100%);
      opacity: 0.55;
    }

    /* Layer 2 – mid */
    .mtn-2 {
      clip-path: polygon(
        0 100%, 0 90%, 4% 76%, 9% 82%, 13% 68%,
        18% 58%, 22% 66%, 26% 54%, 30% 42%,
        35% 34%, 39% 46%, 43% 36%, 47% 26%,
        51% 36%, 55% 24%, 59% 16%, 63% 28%,
        67% 20%, 71% 14%, 75% 24%, 79% 16%,
        83% 28%, 87% 20%, 90% 34%, 93% 26%,
        96% 36%, 99% 28%, 100% 38%, 100% 100%
      );
      background: linear-gradient(180deg, #1D3F68 0%, #122438 100%);
      opacity: 0.7;
    }

    /* Layer 3 – nearest, darkest */
    .mtn-3 {
      clip-path: polygon(
        0 100%, 0 96%, 5% 82%, 9% 88%, 14% 74%,
        19% 64%, 23% 72%, 28% 60%, 32% 48%,
        37% 40%, 41% 52%, 45% 42%, 50% 30%,
        54% 42%, 58% 30%, 62% 20%, 66% 32%,
        70% 24%, 74% 36%, 78% 28%, 82% 40%,
        86% 32%, 90% 46%, 93% 38%, 96% 50%,
        99% 42%, 100% 52%, 100% 100%
      );
      background: linear-gradient(180deg, #0E1E30 0%, #09131F 100%);
      opacity: 0.9;
    }

    /* Snow highlights */
    .snow {
      position: absolute;
      pointer-events: none;
    }
    .snow::before, .snow::after {
      content: '';
      position: absolute;
      background: rgba(220, 238, 255, 0.14);
    }
    .snow-a { bottom: 47%; left: 56%; }
    .snow-a::before {
      border-left: 18px solid transparent;
      border-right: 18px solid transparent;
      border-bottom: 30px solid rgba(220,238,255,0.18);
    }
    .snow-b { bottom: 44%; left: 29%; }
    .snow-b::before {
      border-left: 14px solid transparent;
      border-right: 14px solid transparent;
      border-bottom: 22px solid rgba(220,238,255,0.13);
    }

    /* Floating cloud nodes */
    .cloud-field {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }
    .cnode {
      position: absolute;
      border-radius: 50%;
      border: 1px solid rgba(74,144,226,0.1);
      background: radial-gradient(circle, rgba(74,144,226,0.05) 0%, transparent 70%);
      animation: float var(--fd, 20s) var(--fdl, 0s) ease-in-out infinite alternate;
    }
    @keyframes float {
      from { transform: translate(0, 0); }
      to   { transform: translate(var(--tx, 12px), var(--ty, -8px)); }
    }

    /* Horizon glow */
    .horizon-glow {
      position: absolute;
      bottom: 60%;
      left: 0; right: 0;
      height: 120px;
      background: linear-gradient(
        180deg,
        transparent 0%,
        rgba(74,144,226,0.07) 50%,
        transparent 100%
      );
      pointer-events: none;
    }

    /* Hero content */
    .hero-content {
      position: relative;
      z-index: 10;
      max-width: 820px;
      padding: 4rem 0 6rem;
    }

    .hero-slogan {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(2.2rem, 5.2vw, 4rem);
      font-weight: 700;
      line-height: 1.1;
      letter-spacing: -0.02em;
      color: var(--white);
      margin-bottom: 1.5rem;
    }

    .hero-slogan .line-accent { color: var(--sky); }
    .hero-slogan .line-sand  { color: var(--sand); }

    .hero-sub {
      font-size: clamp(1rem, 1.9vw, 1.18rem);
      color: var(--muted);
      line-height: 1.8;
      max-width: 620px;
      margin-bottom: 2.8rem;
      font-weight: 300;
    }

    .btn {
      display: inline-block;
      padding: 0.85rem 2.1rem;
      border-radius: 3px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-decoration: none;
      transition: background 0.2s, color 0.2s, transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      border: none;
    }
    .btn-sky {
      background: var(--sky);
      color: var(--ink);
    }
    .btn-sky:hover {
      background: var(--sky-hi);
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(74,144,226,0.35);
    }
    .btn-sky:focus-visible { outline: 2px solid var(--sky); outline-offset: 3px; }

    /* altitude marker */
    .alt-marker {
      position: absolute;
      bottom: 2.5rem;
      left: 0;
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--dim);
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }
    .alt-marker::before {
      content: '';
      display: block;
      width: 40px; height: 1px;
      background: var(--dim);
    }

    /* ═══════════════════════════════════════════
       ECOSYSTEM
    ═══════════════════════════════════════════ */
    #ecosystem {
      background: var(--deep);
      padding: 6rem 0;
    }

    .eco-header {
      margin-bottom: 3.5rem;
    }

    /* Cards grid */
    .eco-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-bottom: 2.5rem;
    }

    @media (max-width: 860px) {
      .eco-grid { grid-template-columns: 1fr; }
    }

    .eco-card {
      background: var(--card);
      border: 1px solid var(--rim);
      border-radius: 6px;
      padding: 2rem 1.8rem;
      position: relative;
      overflow: hidden;
      transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
    }
    .eco-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--sky), transparent);
      opacity: 0;
      transition: opacity 0.25s;
    }
    .eco-card:hover {
      border-color: rgba(74,144,226,0.4);
      transform: translateY(-3px);
      box-shadow: 0 12px 36px rgba(0,0,0,0.35);
    }
    .eco-card:hover::before { opacity: 1; }

    /* Card CSS icons */
    .card-icon {
      width: 48px; height: 48px;
      margin-bottom: 1.4rem;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
    }

    /* Icon: Procurement – stacked server bars */
    .icon-proc {
      background: rgba(74,144,226,0.1);
      border: 1px solid rgba(74,144,226,0.2);
      flex-direction: column;
      gap: 4px;
      padding: 10px;
    }
    .icon-proc::before, .icon-proc::after {
      content: '';
      display: block;
      width: 26px; height: 5px;
      background: var(--sky);
      border-radius: 2px;
      opacity: 0.85;
    }
    .icon-proc::after { opacity: 0.45; width: 18px; }

    /* Icon: MII – diamond with inner */
    .icon-mii {
      background: rgba(200,169,100,0.1);
      border: 1px solid rgba(200,169,100,0.2);
    }
    .icon-mii::before {
      content: '';
      display: block;
      width: 22px; height: 22px;
      background: var(--sand);
      clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
      opacity: 0.85;
    }

    /* Icon: Delivery – circle with lines */
    .icon-del {
      background: rgba(74,144,226,0.08);
      border: 1px solid rgba(74,144,226,0.15);
      border-radius: 50%;
    }
    .icon-del::before {
      content: '';
      display: block;
      width: 18px; height: 18px;
      border: 2px solid var(--sky);
      border-radius: 50%;
    }
    .icon-del::after {
      content: '';
      position: absolute;
      width: 8px; height: 8px;
      background: var(--sky);
      border-radius: 50%;
    }

    .card-title {
      font-family: Georgia, serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 0.7rem;
    }

    .card-body {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.75;
    }

    /* Brand row */
    .brand-row {
      margin-top: 1.1rem;
      font-size: 0.8rem;
      color: var(--dim);
      letter-spacing: 0.06em;
    }
    .brand-note {
      display: block;
      margin-top: 0.4rem;
      font-size: 0.65rem;
      color: var(--dim);
      opacity: 0.75;
      font-style: italic;
      line-height: 1.5;
    }

    /* Trust strip */
    .trust-strip {
      margin-top: 2rem;
      padding: 1.1rem 1.8rem;
      background: var(--card);
      border: 1px solid var(--rim);
      border-radius: 4px;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem 2rem;
      align-items: center;
      justify-content: center;
    }
    .trust-strip span {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .trust-strip span::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--sky);
      flex-shrink: 0;
    }

    /* ═══════════════════════════════════════════
       VISION
    ═══════════════════════════════════════════ */
    #vision {
      background: var(--ink);
      padding: 6rem 0;
    }

    .vision-header {
      margin-bottom: 3.5rem;
    }

    .vision-sub {
      font-size: 0.95rem;
      color: var(--muted);
      margin-top: 0.6rem;
    }

    .pillars {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .pillar {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 0;
      padding: 2.2rem 0;
      border-bottom: 1px solid var(--rim);
      position: relative;
      transition: background 0.2s;
      cursor: default;
    }
    .pillar:last-child { border-bottom: none; }
    .pillar::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: transparent;
      transition: background 0.2s;
    }
    .pillar:hover::before { background: var(--sky); }
    .pillar:hover { background: rgba(74,144,226,0.04); }

    .pillar-num {
      font-family: Georgia, serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--rim);
      line-height: 1;
      padding-top: 0.15rem;
      transition: color 0.2s;
      padding-left: 0.5rem;
      user-select: none;
    }
    .pillar:hover .pillar-num { color: var(--sky); }

    .pillar-content { padding-left: 1rem; }
    .pillar-title {
      font-family: Georgia, serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 0.5rem;
      line-height: 1.25;
    }
    .pillar-body {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.75;
      max-width: 680px;
    }

    @media (max-width: 560px) {
      .pillar { grid-template-columns: 56px 1fr; }
      .pillar-num { font-size: 1.7rem; }
    }

    /* ═══════════════════════════════════════════
       VENTURES
    ═══════════════════════════════════════════ */
    #ventures {
      background: var(--deep);
      padding: 6rem 0;
    }

    .ventures-header { margin-bottom: 3.5rem; }

    .ventures-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    @media (max-width: 800px) {
      .ventures-grid { grid-template-columns: 1fr; }
    }

    .venture-card {
      background: var(--card);
      border: 1px solid var(--rim);
      border-radius: 6px;
      padding: 2.2rem 1.8rem;
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.3s, border-color 0.3s, transform 0.3s;
    }
    .venture-card::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 6px;
      box-shadow: inset 0 0 0 1px rgba(74,144,226,0);
      transition: box-shadow 0.3s;
      pointer-events: none;
    }
    .venture-card:hover {
      border-color: rgba(74,144,226,0.35);
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.4), 0 0 24px rgba(74,144,226,0.1);
    }
    .venture-card:hover::after {
      box-shadow: inset 0 0 0 1px rgba(74,144,226,0.2);
    }

    /* Small glow orb top-right */
    .venture-card .orb {
      position: absolute;
      top: -30px; right: -30px;
      width: 90px; height: 90px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(74,144,226,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .venture-status {
      font-size: 0.65rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--sky);
      margin-bottom: 1rem;
      padding: 0.2rem 0.6rem;
      border: 1px solid rgba(74,144,226,0.25);
      border-radius: 2px;
      display: inline-block;
    }

    .venture-title {
      font-family: Georgia, serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 0.7rem;
      line-height: 1.3;
    }

    .venture-body {
      font-size: 0.88rem;
      color: var(--muted);
      line-height: 1.75;
    }

    /* ═══════════════════════════════════════════
       CONTACT & FOOTER
    ═══════════════════════════════════
